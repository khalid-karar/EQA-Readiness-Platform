name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Provision pinned Chromium (install-time only)
        run: pnpm provision:chromium

      - name: Install Poppler (pdftoppm) for PDF visual regression
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

  pdf-determinism:
    name: Evidence pack PDF determinism
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Provision pinned Chromium (install-time only)
        run: pnpm provision:chromium

      - name: Assert byte-identical PDF renders
        run: pnpm test:pdf-determinism
        env:
          # Fresh Chromium per render — catches drift a shared browser would mask.
          EQA_PDF_REUSE_BROWSER: "false"

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.21.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repository (must find no leaks)
        run: gitleaks detect --no-git --config .gitleaks.toml --redact --verbose

      - name: Prove detection on fixture (must find the planted leak)
        run: |
          if gitleaks detect --no-git --no-banner --source tools/secret-scan/fixtures; then
            echo "::error::gitleaks did not detect the planted fixture secret — secret scanning is broken"
            exit 1
          else
            echo "gitleaks correctly detected the planted fixture secret"
          fi
