# Local dev stack — synthetic data only. See infra/DEV.md.
#
# Usage: docker compose -f docker-compose.dev.yml up -d
name: eqa-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: eqa-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eqa
    ports:
      - "5432:5432"
    volumes:
      - eqa_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-dev.sql:/docker-entrypoint-initdb.d/01-init-dev.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eqa"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    build:
      context: ./infra/keycloak
      dockerfile: Dockerfile
    container_name: eqa-dev-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_CACHE: local
      JAVA_OPTS_APPEND: "-Xms128m -Xmx512m"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      EQA_WEB_CLIENT_SECRET: eqa-web-local-dev-secret
    ports:
      - "8080:8080"

  keycloak-bootstrap:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: eqa-dev-keycloak-bootstrap
    depends_on:
      - keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_DEMO_USER_PASSWORD: demo
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "Waiting for Keycloak..."
        for i in $$(seq 1 90); do
          if /opt/keycloak/bin/kcadm.sh config credentials \
            --server "http://keycloak:8080" \
            --realm master \
            --user "$${KEYCLOAK_ADMIN}" \
            --password "$${KEYCLOAK_ADMIN_PASSWORD}" 2>/dev/null; then
            break
          fi
          sleep 5
        done
        for username in cae.demo audit.demo board.demo; do
          /opt/keycloak/bin/kcadm.sh set-password -r eqa --username "$$username" \
            --new-password "$${KEYCLOAK_DEMO_USER_PASSWORD}"
          echo "Password set for $$username"
        done
    restart: "no"

  clamav:
    image: clamav/clamav:1.4
    container_name: eqa-dev-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"

  minio:
    image: minio/minio:latest
    container_name: eqa-dev-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - eqa_minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: eqa-dev-minio-init
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Waiting for MinIO..."
        for i in $$(seq 1 30); do
          if mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; then
            break
          fi
          sleep 2
        done
        mc mb local/eqa-evidence --ignore-existing
        echo "Bucket eqa-evidence ready"
    restart: "no"

volumes:
  eqa_postgres_data:
  eqa_minio_data:
